<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenVoice AAC - Pro Build</title>
    <style>
        :root {
            /* Shared Tile Colors */
            --tile-blue: #2755E2;
            --tile-purple: #7F22D9;
            --tile-teal: #188074;
            --tile-slate: #5C6A86;
            --tile-pink: #BE185D;
            --tile-add: #384152;
            --yellow-bar: #FEF9C3;
            --hold-color: #0D2778;
            /* Dark Mode Specs */
            --bg-app: #121827;
            --bg-header: #2A3040;
            --bg-nav: #8694AF;
            --nav-inactive: #364C65;
            --text-main: #FFFFFF;
            --text-sub: #9CA3AF;
            --nav-shadow: none;
            /* Emergency/Help Colors */
            --help-red: #BB2020;
        }

        [data-theme="light"] {
            --bg-app: #F4F6FA;
            --bg-header: #8694AF;
            --bg-nav: #FFFFFF;
            --nav-inactive: #364C65;
            --text-main: #121827;
            --text-sub: #4B5563;
            --nav-shadow: 0px 4px 11.9px 0px rgba(0, 0, 0, 0.25);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-app);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background-color: var(--bg-header);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 70px;
        }

        .header-logo {
            max-width: clamp(140px, 35vw, 389px);
            height: auto;
            object-fit: contain;
        }

        .toggle-group { display: flex; gap: 8px; }

        .toggle-btn {
            width: clamp(38px, 8vw, 44px);
            height: clamp(38px, 8vw, 44px);
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 4px;
        }
        .toggle-btn svg { width: 100%; height: 100%; }

        .nav-bar {
            background: var(--bg-nav);
            box-shadow: var(--nav-shadow);
            width: 100%; 
            display: flex;
            flex-wrap: wrap;
            padding: 10px 15px; 
            box-sizing: border-box;
            gap: 8px; 
            align-items: center;
        }

        .tab, .btn-info-nav {
            padding: 8px 18px; 
            border-radius: 54px; 
            border: none;
            background: var(--nav-inactive); 
            color: white;
            font-weight: 600;
            cursor: pointer; 
            font-size: clamp(14px, 2.1vw, 22px);
            transition: background 0.2s;
            display: flex; 
            align-items: center;
            white-space: nowrap;
        }

        .nav-icon {
            height: clamp(14px, 1.8vw, 20px);
            width: auto;
            margin-right: 8px;
            pointer-events: none;
        }

        .btn-info-nav { margin-left: auto; width: 40px; height: 40px; padding: 0; }
        .btn-info-nav .nav-icon { margin-right: 0; }

        .tab.active[data-mode="core"] { background: var(--tile-blue); }
        .tab.active[data-mode="feeling"] { background: var(--tile-pink); }
        .tab.active[data-mode="want"] { background: var(--tile-purple); }
        .tab.active[data-mode="help"] { background: var(--help-red); }

        .content {
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px 15px;
        }

        .phrase-bar {
            background: var(--yellow-bar); 
            color: #121827;
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 25px;
            display: flex; 
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: clamp(18px, 2.8vw, 24px);
        }

        .grid { 
            display: grid; 
            gap: 12px;
            grid-template-columns: repeat(2, 1fr);
        }
        @media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        .tile {
            aspect-ratio: 1 / 1.22;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            color: white;
            padding: 12px 6px;
            box-sizing: border-box;
            user-select: none;
            overflow: hidden;
        }

        .tile img {
            width: 90%;
            height: auto;
            max-height: 70%;
            object-fit: contain;
            margin-bottom: 8px;
            pointer-events: none;
        }

        .tile span {
            font-size: clamp(14px, 2vw, 22px);
            font-weight: 500;
            z-index: 2;
            width: 100%;
            text-align: center;
            line-height: 1.1;
        }

        .tile.blue { background: var(--tile-blue); }
        .tile.purple { background: var(--tile-purple); }
        .tile.teal { background: var(--tile-teal); }
        .tile.slate { background: var(--tile-slate); }
        .tile.pink { background: var(--tile-pink); }
        .tile.add { background: var(--tile-add); border: 2px dashed rgba(255,255,255,0.2); }

        .tile::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--hold-color);
            opacity: 0; z-index: 1;
            transition: opacity 3s linear;
        }
        .tile.is-holding::before { opacity: 1; }

        .grid.help-grid {
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            justify-content: center;
            gap: 20px;
        }
        .tile.red { 
            background: var(--help-red); 
            width: 100%;
            max-width: 327px;
            aspect-ratio: 1/1;
            padding: 24px;
            margin: 0 auto;
        }
        .tile.red span { font-size: clamp(20px, 4vw, 28px); font-weight: 700; }

        .section-title { 
            font-size: clamp(18px, 2.5vw, 24px); 
            font-weight: 300;
            color: var(--text-sub); 
            margin: 30px 0 12px; 
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: var(--bg-header); padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; color: white;
            text-align: left;
        }
        .modal-content h2 { text-align: center; margin-top: 0; }
        .modal-content ul { padding-left: 20px; line-height: 1.6; }
        .modal-btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            font-weight: 700; margin-top: 10px; cursor: pointer;
        }
    </style>
</head>
<body data-theme="dark">

<header>
    <button onclick="changeMode('help')" style="background:var(--help-red); border:none; color:white; padding:10px 20px; border-radius:30px; font-weight:bold; cursor:pointer;">
        ⚠️ Get help
    </button>
    <img src="icons/Header.svg" alt="Logo" class="header-logo">
    <div class="toggle-group" id="theme-controls"></div>
</header>

<nav class="nav-bar">
    <button class="tab active" data-mode="core" onclick="changeMode('core')">
        <img src="icons/Sentence.svg" class="nav-icon" alt=""> Sentence building
    </button>
    <button class="tab" data-mode="feeling" onclick="changeMode('feeling')">
        <img src="icons/Feel.svg" class="nav-icon" alt=""> I am feeling
    </button>
    <button class="tab" data-mode="want" onclick="changeMode('want')">
        <img src="icons/Want.svg" class="nav-icon" alt=""> I want
    </button>
    <button class="btn-info-nav" onclick="openModal('infoModal')">
        <img src="icons/Help.svg" class="nav-icon" alt="">
    </button>
</nav>

<main class="content">
    <div class="phrase-bar" id="phrase-container">
        <span id="phrase">I want to...</span>
        <div style="display:flex; gap:15px;">
            <span onclick="speakCurrentPhrase()" style="cursor:pointer">🔊</span>
            <span onclick="clearP()" style="cursor:pointer">🗑️</span>
        </div>
    </div>
    <div id="grid-root"></div>
</main>

<div id="infoModal" class="modal-overlay">
    <div class="modal-content">
        <h2>Information</h2>
        <ul>
            <li>Help / more info coming soon</li>
            <li>Progressive onboarding coming soon</li>
            <li>Haptic feedback coming soon</li>
        </ul>
        <button class="tab" style="width:100%; margin-top: 20px;" onclick="closeModal('infoModal')">Close</button>
    </div>
</div>

<script>
    const baseIconPath = 'icons/';
    let mode = 'core';

    /* SVG ViewBoxes corrected to prevent clipping */
    const uiSVGs = {
        dark: `<svg viewBox="50 50 412 412" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M223.5 38.7c-7.7 0-14 6.3-14 14s6.3 14 14 14c79.2 0 143.7 64.5 143.7 143.7s-64.5 143.7-143.7 143.7c-7.7 0-14 6.3-14 14s6.3 14 14 14c94.7 0 171.7-77 171.7-171.7S318.2 38.7 223.5 38.7z"/></svg>`,
        light: `<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><circle cx="256" cy="256" r="80" fill="currentColor"/><path stroke="currentColor" stroke-width="32" stroke-linecap="round" d="M256 48v48m0 320v48M48 256h48m320 0h48M108.9 108.9l33.9 33.9m226.4 226.4l33.9 33.9m0-294.2l-33.9 33.9M142.8 369.2l-33.9 33.9"/></svg>`
    };

    /* RESTORED VOCABULARY AND SECTION HEADINGS */
    const vocab = {
        core: [
            { title: "People", items: [
                {l:'I', i:'I.svg', c:'blue'}, {l:'You', i:'You.svg', c:'blue'}, 
                {l:'They', i:'They.svg', c:'blue'}, {l:'We', i:'We.svg', c:'blue'}, 
                {l:'Who', i:'Who.svg', c:'blue'}, {l:'She', i:'She.svg', c:'blue'}
            ]},
            { title: "Needs & Wants", items: [
                {l:'Want', i:'Want.svg', c:'purple'}, {l:'Need', i:'Need.svg', c:'purple'}, 
                {l:'Like', i:'Like.svg', c:'purple'}, {l:'Have', i:'Have.svg', c:'purple'},
                {l:'Where', i:'Where.svg', c:'blue'}, {l:'What', i:'What.svg', c:'blue'}
            ]},
            { title: "Actions", items: [
                {l:'Go', i:'Go.svg', c:'purple'}, {l:'Eat', i:'Eat.svg', c:'purple'}, 
                {l:'Drink', i:'Drink.svg', c:'purple'}, {l:'Play', i:'Play.svg', c:'purple'}, 
                {l:'See', i:'See.svg', c:'purple'}, {l:'Stop', i:'Stop.svg', c:'teal'}
            ]},
            { title: "Times & Responses", items: [
                {l:'Time', i:'Time.svg', c:'blue'}, {l:'Now', i:'Now.svg', c:'slate'}, 
                {l:'Later', i:'Later.svg', c:'slate'}, {l:'Yes', i:'Yes.svg', c:'slate'}, 
                {l:'No', i:'No.svg', c:'slate'}, {l:'Please', i:'Please.svg', c:'teal'}
            ]}
        ],
        feeling: [{ title: "Feelings", items: [
            {l:'Happy', i:'Happy.svg', c:'pink'}, {l:'Sad', i:'Sad.svg', c:'pink'}, 
            {l:'Sleepy', i:'Sleepy.svg', c:'pink'}, {l:'Mad', i:'Mad.svg', c:'pink'},
            {l:'Scared', i:'Scared.svg', c:'pink'}, {l:'Sick', i:'Sick.svg', c:'pink'}
        ]}],
        want: [{ title: "Needs", items: [
            {l:'Water', i:'Water.svg', c:'purple'}, {l:'Food', i:'Food.svg', c:'purple'}, 
            {l:'Toilet', i:'Bathroom.svg', c:'purple'}, {l:'Break', i:'Break.svg', c:'purple'},
            {l:'Help', i:'Help.svg', c:'teal'}, {l:'Hug', i:'A-hug.svg', c:'purple'}
        ]}],
        help: [{ title: "Emergency", items: [
            {l:'Call 911', i:'Call-911.svg', c:'red'}, {l:'Call Mom', i:'Call-mom.svg', c:'red'}
        ]}]
    };

    function renderThemeControls() {
        const theme = document.body.dataset.theme;
        document.getElementById('theme-controls').innerHTML = `
            <button class="toggle-btn" onclick="setTheme('dark')" style="opacity:${theme==='dark'?'1':'0.3'}">${uiSVGs.dark}</button>
            <button class="toggle-btn" onclick="setTheme('light')" style="opacity:${theme==='light'?'1':'0.3'}">${uiSVGs.light}</button>
        `;
    }

    function render() {
        const root = document.getElementById('grid-root');
        root.innerHTML = '';
        document.getElementById('phrase-container').style.display = (mode === 'core' ? 'flex' : 'none');

        vocab[mode].forEach((sec) => {
            const title = document.createElement('div');
            title.className = 'section-title';
            title.innerText = sec.title;
            root.appendChild(title);

            const grid = document.createElement('div');
            grid.className = (mode === 'help') ? 'grid help-grid' : 'grid';

            sec.items.forEach((item) => {
                const t = document.createElement('div');
                t.className = `tile ${item.c}`;
                t.innerHTML = `<img src="${baseIconPath}${item.i}"><span>${item.l}</span>`;
                t.onclick = () => {
                    if (mode === 'core') {
                        const p = document.getElementById('phrase');
                        if (p.innerText.includes('...')) p.innerText = '';
                        p.innerText += ' ' + item.l;
                    }
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance(item.l));
                };
                grid.appendChild(t);
            });
            root.appendChild(grid);
        });
        renderThemeControls();
    }

    function setTheme(t) { document.body.dataset.theme = t; renderThemeControls(); }
    function changeMode(m) { mode = m; document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === m)); render(); }
    function clearP() { document.getElementById('phrase').innerText = 'I want to...'; }
    function speakCurrentPhrase() { window.speechSynthesis.speak(new SpeechSynthesisUtterance(document.getElementById('phrase').innerText)); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    render();
</script>
</body>
</html>
