<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenVoice AAC - Pro Build</title>
    <style>
        :root {
            /* Shared Tile Colors */
            --tile-blue: #2755E2;
            --tile-purple: #7F22D9;
            --tile-teal: #188074;
            --tile-slate: #5C6A86;
            --tile-pink: #BE185D;
            --tile-add: #384152;
            --yellow-bar: #FEF9C3;
            --hold-color: #0D2778;
            /* Dark Mode Specs */
            --bg-app: #121827;
            --bg-header: #2A3040;
            --bg-nav: #8694AF;
            --nav-inactive: #364C65;
            --text-main: #FFFFFF;
            --text-sub: #9CA3AF;
            --nav-shadow: none;
            /* Emergency/Help Colors */
            --help-red: #BB2020;
        }

        [data-theme="light"] {
            --bg-app: #F4F6FA;
            --bg-header: #8694AF;
            --bg-nav: #FFFFFF;
            --nav-inactive: #364C65;
            --text-main: #121827;
            --text-sub: #4B5563;
            --nav-shadow: 0px 4px 11.9px 0px rgba(0, 0, 0, 0.25);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-app);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background-color: var(--bg-header);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 70px;
        }

        .header-logo {
            max-width: clamp(140px, 35vw, 389px);
            height: auto;
            object-fit: contain;
        }

        .toggle-group { display: flex; gap: 8px; }

        .toggle-btn {
            width: clamp(38px, 8vw, 44px);
            height: clamp(38px, 8vw, 44px);
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 4px;
        }
        .toggle-btn svg { width: 100%; height: 100%; }

        .nav-bar {
            background: var(--bg-nav);
            box-shadow: var(--nav-shadow);
            width: 100%; 
            display: flex;
            flex-wrap: wrap;
            padding: 10px 15px; 
            box-sizing: border-box;
            gap: 8px; 
            align-items: center;
        }

        .tab, .btn-info-nav {
            padding: 8px 18px; 
            border-radius: 54px; 
            border: none;
            background: var(--nav-inactive); 
            color: white;
            font-weight: 600;
            cursor: pointer; 
            font-size: clamp(14px, 2.1vw, 22px);
            transition: background 0.2s;
            display: flex; 
            align-items: center;
            white-space: nowrap;
        }

        .nav-icon {
            height: clamp(14px, 1.8vw, 20px);
            width: auto;
            margin-right: 8px;
            pointer-events: none;
        }

        .btn-info-nav { margin-left: auto; width: 40px; height: 40px; padding: 0; }
        .btn-info-nav .nav-icon { margin-right: 0; }

        .tab.active[data-mode="core"] { background: var(--tile-blue); }
        .tab.active[data-mode="feeling"] { background: var(--tile-pink); }
        .tab.active[data-mode="want"] { background: var(--tile-purple); }
        .tab.active[data-mode="help"] { background: var(--help-red); }

        .content {
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px 15px;
        }

        .phrase-bar {
            background: var(--yellow-bar); 
            color: #121827;
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 25px;
            display: flex; 
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: clamp(18px, 2.8vw, 24px);
        }

        /* RESPONSIVE GRID */
        .grid { 
            display: grid; 
            gap: 12px;
            grid-template-columns: repeat(2, 1fr);
        }
        @media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        .tile {
            aspect-ratio: 1 / 1.22;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            color: white;
            padding: 12px 6px;
            box-sizing: border-box;
            user-select: none;
            overflow: hidden;
        }

        .tile img {
            width: 90%;
            height: auto;
            max-height: 70%;
            object-fit: contain;
            margin-bottom: 8px;
            pointer-events: none;
        }

        .tile span {
            font-size: clamp(14px, 2vw, 22px);
            font-weight: 500;
            z-index: 2;
            width: 100%;
            text-align: center;
            line-height: 1.1;
        }

        .tile.blue { background: var(--tile-blue); }
        .tile.purple { background: var(--tile-purple); }
        .tile.teal { background: var(--tile-teal); }
        .tile.slate { background: var(--tile-slate); }
        .tile.pink { background: var(--tile-pink); }
        .tile.add { background: var(--tile-add); border: 2px dashed rgba(255,255,255,0.2); }

        .tile::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--hold-color);
            opacity: 0; z-index: 1;
            transition: opacity 3s linear;
        }
        .tile.is-holding::before { opacity: 1; }

        /* HELP GRID */
        .grid.help-grid {
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            justify-content: center;
            gap: 20px;
        }
        .tile.red { 
            background: var(--help-red); 
            width: 100%;
            max-width: 327px;
            aspect-ratio: 1/1;
            padding: 24px;
            margin: 0 auto;
        }
        .tile.red span { font-size: clamp(20px, 4vw, 28px); font-weight: 700; }

        .section-title { 
            font-size: clamp(18px, 2.5vw, 24px); 
            font-weight: 300;
            color: var(--text-sub); 
            margin: 30px 0 12px; 
        }

        /* CALL SCREEN */
        .call-container {
            display: none; flex-direction: column; align-items: center; 
            padding-top: 40px; min-height: 70vh; text-align: center;
        }
        .call-avatar-tile {
            width: clamp(200px, 60vw, 280px); 
            height: clamp(200px, 60vw, 280px); 
            background: var(--help-red); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 40px 0;
        }
        .call-avatar-tile img { width: 70%; height: auto; }

        /* MODALS */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: var(--bg-header); padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; color: white;
        }
        .modal-btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            font-weight: 700; margin-top: 10px; cursor: pointer;
        }
        .modal-input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444;
            background: #1e2533; color: white; margin-top: 10px; box-sizing: border-box;
        }
    </style>
</head>
<body data-theme="dark">

<header>
    <button onclick="changeMode('help')" id="helpBtn" style="background:var(--help-red); border:none; color:white; padding:10px 20px; border-radius:30px; font-weight:bold; cursor:pointer;">
        ⚠️ Get help
    </button>
    <img src="icons/Header.svg" alt="Logo" class="header-logo">
    <div class="toggle-group" id="theme-controls"></div>
</header>

<nav class="nav-bar">
    <button class="tab active" data-mode="core" onclick="changeMode('core')">
        <img src="icons/Sentence.svg" class="nav-icon" alt=""> Sentence building
    </button>
    <button class="tab" data-mode="feeling" onclick="changeMode('feeling')">
        <img src="icons/Feel.svg" class="nav-icon" alt=""> I am feeling
    </button>
    <button class="tab" data-mode="want" onclick="changeMode('want')">
        <img src="icons/Want.svg" class="nav-icon" alt=""> I want
    </button>
    <button class="btn-info-nav" onclick="openModal('infoModal')">
        <img src="icons/Help.svg" class="nav-icon" alt="">
    </button>
</nav>

<main class="content">
    <div class="phrase-bar" id="phrase-container">
        <span id="phrase">I want to...</span>
        <div style="display:flex; gap:15px;">
            <span onclick="speakCurrentPhrase()" style="cursor:pointer">🔊</span>
            <span onclick="clearP()" style="cursor:pointer">🗑️</span>
        </div>
    </div>

    <div id="grid-root"></div>

    <div id="call-screen" class="call-container">
        <div style="font-size:32px; font-weight:800;" id="active-call-name">Emergency</div>
        <div style="color:var(--text-sub)">00:03</div>
        <div class="call-avatar-tile" id="active-call-avatar"></div>
        <button class="tab" style="background:var(--help-red); padding:15px 40px; transform:rotate(135deg)" onclick="endCall()">📞</button>
    </div>
</main>

<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <h2 id="editTitle">Edit Tile</h2>
        <button class="modal-btn" style="background:var(--tile-blue); color:white" onclick="editLabel()">Edit Label</button>
        <button class="modal-btn" style="background:var(--help-red); color:white" onclick="deleteTile()">Delete Tile</button>
        <button class="modal-btn" style="background:var(--tile-slate); color:white" onclick="closeModal('editModal')">Cancel</button>
    </div>
</div>

<div id="addModal" class="modal-overlay">
    <div class="modal-content">
        <h2>Add New Tile</h2>
        <input type="text" id="addLabel" class="modal-input" placeholder="Label (e.g. Pizza)">
        <input type="text" id="addIcon" class="modal-input" placeholder="Icon Filename (e.g. Pizza.svg)">
        <button class="modal-btn" style="background:var(--tile-blue); color:white" onclick="confirmAdd()">Add Tile</button>
        <button class="modal-btn" style="background:var(--tile-slate); color:white" onclick="closeModal('addModal')">Cancel</button>
    </div>
</div>

<div id="infoModal" class="modal-overlay">
    <div class="modal-content">
        <h2>Information</h2>
        <p>OpenVoice AAC v2.1 Pro Build</p>
        <button class="tab" style="width:100%" onclick="closeModal('infoModal')">Close</button>
    </div>
</div>

<script>
    const baseIconPath = 'icons/';
    let mode = 'core';
    let holdTimer, longPressTriggered = false, currentTarget = null;

    const uiSVGs = {
        dark: `<svg viewBox="90 90 332 332" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M223.5 38.7c-7.7 0-14 6.3-14 14s6.3 14 14 14c79.2 0 143.7 64.5 143.7 143.7s-64.5 143.7-143.7 143.7c-7.7 0-14 6.3-14 14s6.3 14 14 14c94.7 0 171.7-77 171.7-171.7S318.2 38.7 223.5 38.7z"/></svg>`,
        light: `<svg viewBox="60 60 392 392" xmlns="http://www.w3.org/2000/svg"><circle cx="256" cy="256" r="80" fill="currentColor"/><path stroke="currentColor" stroke-width="32" stroke-linecap="round" d="M256 48v48m0 320v48M48 256h48m320 0h48M108.9 108.9l33.9 33.9m226.4 226.4l33.9 33.9m0-294.2l-33.9 33.9M142.8 369.2l-33.9 33.9"/></svg>`
    };

    const vocab = {
        core: [
            { title: "People & Questions", items: [{l:'I', i:'I.svg', c:'blue'}, {l:'You', i:'You.svg', c:'blue'}, {l:'What', i:'What.svg', c:'blue'}, {l:'Where', i:'Where.svg', c:'blue'}] },
            { title: "Common Actions", items: [{l:'Eat', i:'Eat.svg', c:'purple'}, {l:'Drink', i:'Drink.svg', c:'purple'}, {l:'Go', i:'Go.svg', c:'purple'}, {l:'Help', i:'Help.svg', c:'teal'}, {l:'Stop', i:'Stop.svg', c:'teal'}] },
            { title: "Descriptors", items: [{l:'Big', i:'Big.svg', c:'pink'}, {l:'Small', i:'Small.svg', c:'pink'}, {l:'Hot', i:'Hot.svg', c:'pink'}] }
        ],
        feeling: [{ title: "Feelings", items: [{l:'Happy', i:'Happy.svg', c:'pink'}, {l:'Sad', i:'Sad.svg', c:'pink'}, {l:'Sleepy', i:'Sleepy.svg', c:'pink'}, {l:'Mad', i:'Mad.svg', c:'pink'}] }],
        want: [{ title: "Needs", items: [{l:'Water', i:'Water.svg', c:'purple'}, {l:'Food', i:'Food.svg', c:'purple'}, {l:'Toilet', i:'Bathroom.svg', c:'purple'}, {l:'Break', i:'Break.svg', c:'purple'}] }],
        help: [{ title: "Emergency", items: [{l:'Call 911', i:'Call-911.svg', c:'red'}, {l:'Call Mom', i:'Call-mom.svg', c:'red'}] }]
    };

    function renderThemeControls() {
        const theme = document.body.dataset.theme;
        document.getElementById('theme-controls').innerHTML = `
            <button class="toggle-btn" onclick="setTheme('dark')" style="opacity:${theme==='dark'?'1':'0.3'}">${uiSVGs.dark}</button>
            <button class="toggle-btn" onclick="setTheme('light')" style="opacity:${theme==='light'?'1':'0.3'}">${uiSVGs.light}</button>
        `;
    }

    function render() {
        const root = document.getElementById('grid-root');
        root.innerHTML = '';
        document.getElementById('phrase-container').style.display = (mode === 'core' ? 'flex' : 'none');
        document.getElementById('call-screen').style.display = 'none';
        root.style.display = 'block';

        vocab[mode].forEach((sec, sIdx) => {
            const title = document.createElement('div');
            title.className = 'section-title';
            title.innerText = sec.title;
            root.appendChild(title);

            const grid = document.createElement('div');
            grid.className = (mode === 'help') ? 'grid help-grid' : 'grid';

            sec.items.forEach((item, iIdx) => {
                const t = document.createElement('div');
                t.className = `tile ${item.c}`;
                t.innerHTML = `<img src="${baseIconPath}${item.i}"><span>${item.l}</span>`;
                
                t.onpointerdown = () => {
                    longPressTriggered = false;
                    t.classList.add('is-holding');
                    holdTimer = setTimeout(() => {
                        longPressTriggered = true;
                        t.classList.remove('is-holding');
                        openEdit(sec, iIdx);
                    }, 2500);
                };
                t.onpointerup = t.onpointerleave = () => { clearTimeout(holdTimer); t.classList.remove('is-holding'); };

                t.onclick = () => {
                    if(longPressTriggered) return;
                    handleTap(item);
                };
                grid.appendChild(t);
            });

            if(mode !== 'help') {
                const add = document.createElement('div');
                add.className = 'tile add';
                add.innerHTML = `<span>+ Add</span>`;
                add.onclick = () => openAdd(sec);
                grid.appendChild(add);
            }
            root.appendChild(grid);
        });
        renderThemeControls();
    }

    function handleTap(item) {
        if (mode === 'help') {
            document.getElementById('grid-root').style.display = 'none';
            document.getElementById('call-screen').style.display = 'flex';
            document.getElementById('active-call-name').innerText = item.l;
            document.getElementById('active-call-avatar').innerHTML = `<img src="${baseIconPath}${item.i}">`;
            return;
        }
        if (mode === 'core') {
            const p = document.getElementById('phrase');
            if (p.innerText.includes('...')) p.innerText = '';
            p.innerText += ' ' + item.l;
        }
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(item.l));
    }

    function openEdit(section, index) {
        currentTarget = { section, index };
        document.getElementById('editTitle').innerText = `Edit: ${section.items[index].l}`;
        openModal('editModal');
    }

    function editLabel() {
        const newL = prompt("Enter new label:", currentTarget.section.items[currentTarget.index].l);
        if(newL) { currentTarget.section.items[currentTarget.index].l = newL; render(); }
        closeModal('editModal');
    }

    function deleteTile() {
        if(confirm("Delete this tile?")) {
            currentTarget.section.items.splice(currentTarget.index, 1);
            render();
        }
        closeModal('editModal');
    }

    function openAdd(section) {
        currentTarget = section;
        openModal('addModal');
    }

    function confirmAdd() {
        const l = document.getElementById('addLabel').value;
        const i = document.getElementById('addIcon').value;
        if(l && i) {
            currentTarget.items.push({l, i, c: currentTarget.items[0]?.c || 'blue'});
            render(); closeModal('addModal');
        }
    }

    function setTheme(t) { document.body.dataset.theme = t; renderThemeControls(); }
    function changeMode(m) { mode = m; document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === m)); render(); }
    function clearP() { document.getElementById('phrase').innerText = 'I want to...'; }
    function speakCurrentPhrase() { window.speechSynthesis.speak(new SpeechSynthesisUtterance(document.getElementById('phrase').innerText)); }
    function endCall() { render(); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    render();
</script>
</body>
</html>
