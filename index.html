<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenVoice AAC - Pro Build</title>

<style>

:root{
--tile-blue:#2755E2;
--tile-purple:#7F22D9;
--tile-teal:#188074;
--tile-slate:#5C6A86;
--tile-pink:#BE185D;
--tile-add:#384152;
--yellow-bar:#FEF9C3;
--hold-color:#0D2778;

--bg-app:#121827;
--bg-header:#2A3040;
--bg-nav:#8694AF;
--nav-inactive:#364C65;

--text-main:#FFFFFF;
--text-sub:#9CA3AF;
--nav-shadow:none;

--help-red:#BB2020;
}

[data-theme="light"]{
--bg-app:#F4F6FA;
--bg-header:#8694AF;
--bg-nav:#FFFFFF;
--nav-inactive:#364C65;
--text-main:#121827;
--text-sub:#4B5563;
--nav-shadow:0px 4px 11.9px rgba(0,0,0,.25);
}

body{
margin:0;
padding:0;
background:var(--bg-app);
color:var(--text-main);
font-family:system-ui,-apple-system,sans-serif;
transition:background-color .3s;
overflow-x:hidden;
}

header{
background:var(--bg-header);
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
height:60px;
}

.header-logo{
height:40px;
max-width:200px;
}

.toggle-group{display:flex;gap:8px;}

.toggle-btn{
width:44px;
height:44px;
border-radius:12px;
border:none;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
background:transparent;
}

.toggle-btn img{
width:100%;
height:100%;
object-fit:contain;
}

.nav-bar{
background:var(--bg-nav);
box-shadow:var(--nav-shadow);
width:100%;
display:flex;
padding:12px 25px;
gap:12px;
align-items:center;
}

.tab,.btn-info-nav{
padding:10px 24px;
border-radius:54px;
border:none;
background:var(--nav-inactive);
color:white;
font-weight:600;
cursor:pointer;
font-size:14px;
display:flex;
align-items:center;
justify-content:center;
}

.nav-icon{
height:20px;
margin-right:8px;
}

.btn-info-nav{
margin-left:auto;
width:44px;
height:44px;
padding:0;
}

.tab.active[data-mode="core"]{background:var(--tile-blue);}
.tab.active[data-mode="feeling"]{background:var(--tile-pink);}
.tab.active[data-mode="want"]{background:var(--tile-purple);}
.tab.active[data-mode="help"]{background:var(--help-red);}

.content{
max-width:1000px;
margin:0 auto;
padding:24px 25px;
}

.phrase-bar{
background:var(--yellow-bar);
color:#121827;
padding:15px;
border-radius:8px;
margin-bottom:25px;
display:flex;
justify-content:space-between;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:7px;
}

@media(min-width:768px){
.grid{grid-template-columns:repeat(5,1fr);gap:10px;}
}

.tile{
aspect-ratio:104.69/126.25;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
color:white;
font-weight:500;
font-size:14px;
text-align:center;
overflow:hidden;
position:relative;
}

.tile img{
width:50px;
height:50px;
margin-bottom:6px;
object-fit:contain;
}

.tile.red{
background:var(--help-red);
width:327px;
height:327px;
border-radius:20px;
}

.tile.blue{background:var(--tile-blue);}
.tile.purple{background:var(--tile-purple);}
.tile.teal{background:var(--tile-teal);}
.tile.slate{background:var(--tile-slate);}
.tile.pink{background:var(--tile-pink);}
.tile.add{background:var(--tile-add);border:2px dashed rgba(255,255,255,.2);}

.section-title{
font-size:14px;
color:var(--text-sub);
margin:25px 0 10px;
font-weight:600;
}

.modal-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:var(--bg-header);
padding:32px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
display:flex;
flex-direction:column;
gap:20px;
}

.modal-title{
font-size:24px;
font-weight:700;
}

.modal-buttons{
display:flex;
flex-direction:column;
gap:12px;
}

.modal-btn{
padding:16px;
border-radius:12px;
border:none;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

.btn-primary{background:var(--tile-blue);color:white;}
.btn-secondary{background:var(--tile-purple);color:white;}
.btn-danger{background:var(--help-red);color:white;}
.btn-cancel{background:var(--tile-slate);color:white;}

.modal-input{
background:rgba(255,255,255,.1);
border:1px solid rgba(255,255,255,.2);
padding:12px;
border-radius:8px;
color:white;
font-size:16px;
}

.call-container{
display:none;
flex-direction:column;
align-items:center;
padding-top:60px;
height:70vh;
text-align:center;
}

.call-name{
font-size:36px;
font-weight:800;
margin-bottom:8px;
}

.call-timer{
font-size:20px;
color:var(--text-sub);
margin-bottom:50px;
}

.call-avatar-tile{
width:250px;
height:250px;
background:var(--help-red);
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:60px;
}

.call-avatar-tile img{
width:150px;
height:150px;
}

.call-controls{
display:flex;
gap:15px;
}

.call-btn-tile{
width:80px;
height:80px;
border-radius:12px;
background:var(--tile-slate);
border:none;
color:white;
font-size:24px;
cursor:pointer;
}

.call-btn-tile.end{
background:var(--help-red);
transform:rotate(135deg);
}

</style>
</head>

<body data-theme="dark">

<header>

<button onclick="changeMode('help')" id="getHelpHeaderBtn"
style="background:var(--help-red);border:none;color:white;padding:10px 24px;border-radius:30px;font-weight:bold;cursor:pointer;display:flex;gap:8px;">
⚠️ Get help
</button>

<img src="./icons/Header.svg" class="header-logo">

<div class="toggle-group">

<button class="toggle-btn" onclick="setTheme('dark')" id="darkToggle">
<img src="./icons/DM Activated.svg">
</button>

<button class="toggle-btn" onclick="setTheme('light')" id="lightToggle">
<img src="./icons/LM Deactivated.svg">
</button>

</div>

</header>

<nav class="nav-bar">

<button class="tab active" data-mode="core" onclick="changeMode('core')">
<img src="./icons/sentence.svg" class="nav-icon">
Sentence building
</button>

<button class="tab" data-mode="feeling" onclick="changeMode('feeling')">
<img src="./icons/feel.svg" class="nav-icon">
I am feeling
</button>

<button class="tab" data-mode="want" onclick="changeMode('want')">
<img src="./icons/want.svg" class="nav-icon">
I want
</button>

<button class="tab" data-mode="help" onclick="changeMode('help')">
<img src="./icons/help.svg" class="nav-icon">
Help
</button>

<button class="btn-info-nav" onclick="openInfoModal()">
<img src="./icons/help.svg" class="nav-icon">
</button>

</nav>

<main class="content">

<div class="phrase-bar" id="phrase-container">
<span id="phrase">I want to...</span>

<div>
<span onclick="speakCurrentPhrase()">🔊</span>
<span onclick="clearP()">🗑️</span>
</div>

</div>

<div id="grid-root"></div>

</main>

<script>

const baseIconPath="./icons/";

let mode="core";

const vocab={
core:[
{title:"Question Words",items:[
{l:"What",i:"what.svg",c:"blue"},
{l:"Where",i:"where.svg",c:"blue"},
{l:"When",i:"when.svg",c:"blue"},
{l:"Who",i:"who.svg",c:"blue"},
{l:"Why",i:"why.svg",c:"blue"},
{l:"How",i:"how.svg",c:"blue"}
]},
{title:"People / Places",items:[
{l:"I",i:"i.svg",c:"blue"},
{l:"You",i:"you.svg",c:"blue"},
{l:"We",i:"we.svg",c:"blue"},
{l:"They",i:"they.svg",c:"blue"},
{l:"She",i:"she.svg",c:"blue"},
{l:"Time",i:"time.svg",c:"blue"},
{l:"Friend",i:"friend.svg",c:"blue"},
{l:"School",i:"school.svg",c:"blue"},
{l:"Home",i:"home.svg",c:"blue"},
{l:"Family",i:"family.svg",c:"blue"},
{l:"Doctor",i:"doctor.svg",c:"blue"}
]}
]
};

function render(){

const root=document.getElementById("grid-root");
root.innerHTML="";

vocab[mode].forEach(sec=>{

const title=document.createElement("div");
title.className="section-title";
title.innerText=sec.title;
root.appendChild(title);

const grid=document.createElement("div");
grid.className="grid";

sec.items.forEach(item=>{

const tile=document.createElement("div");
tile.className=`tile ${item.c}`;

const iconFile=item.i.charAt(0).toUpperCase()+item.i.slice(1);

tile.innerHTML=`<img src="${baseIconPath}${iconFile}"><span>${item.l}</span>`;

tile.onclick=()=>handleTileTap(item);

grid.appendChild(tile);

});

root.appendChild(grid);

});

}

function handleTileTap(item){

if(mode==="core"){
const p=document.getElementById("phrase");
if(p.innerText.includes("..."))p.innerText="";
p.innerText+=" "+item.l;
}else{
const speech=new SpeechSynthesisUtterance((mode==="feeling"?"I am feeling ":"I want ")+item.l);
speechSynthesis.speak(speech);
}

}

function setTheme(t){
document.body.dataset.theme=t;
}

function changeMode(m){
mode=m;
render();
}

function clearP(){
document.getElementById("phrase").innerText="I want to...";
}

render();

</script>

</body>
</html>
